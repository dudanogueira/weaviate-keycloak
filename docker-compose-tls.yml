# TLS variant of the Weaviate + Keycloak lab.
#
# Keycloak serves HTTPS on port 8443 using a self-signed certificate (generated
# by certs/generate.sh). Weaviate trusts the CA via AUTHENTICATION_OIDC_CERTIFICATE.
#
# Usage (inject the CA PEM before calling compose so it stays in sync with certs/):
#
#   export AUTHENTICATION_OIDC_CERTIFICATE=$(cat certs/ca.pem)
#   docker compose -f docker-compose-tls.yml --project-name weaviate-tls up -d
#
# Or run via the notebook — the Step 2 cell handles the env injection automatically.

services:

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.4
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Issuer URL must be HTTPS so tokens match what Weaviate expects.
      KC_HOSTNAME_URL: "https://host.docker.internal:8443"
      KC_HOSTNAME_ADMIN_URL: "https://host.docker.internal:8443"
      # TLS — cert and key are mounted from ./certs
      KC_HTTPS_CERTIFICATE_FILE: /certs/server.pem
      KC_HTTPS_CERTIFICATE_KEY_FILE: /certs/server-key.pem
    ports:
      - "127.0.0.1:8081:8080"   # HTTP — used for Keycloak admin API calls from Python
      - "127.0.0.1:8443:8443"   # HTTPS — used by Weaviate for OIDC discovery and JWKS
    volumes:
      - ./certs:/certs:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:8443"]
      interval: 10s
      timeout: 5s
      retries: 12

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.36.2
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      # OIDC — issuer is HTTPS Keycloak
      - AUTHENTICATION_OIDC_ENABLED=true
      - AUTHENTICATION_OIDC_ISSUER=https://host.docker.internal:8443/realms/weaviate
      - AUTHENTICATION_OIDC_CLIENT_ID=weaviate
      - AUTHENTICATION_OIDC_USERNAME_CLAIM=preferred_username
      - AUTHENTICATION_OIDC_GROUPS_CLAIM=groups
      # CA certificate — list-form (no value) passes the host env var directly,
      # bypassing YAML interpolation and preserving the newlines Weaviate needs.
      - AUTHENTICATION_OIDC_CERTIFICATE
      # Alternative: skip TLS verification entirely (requires PR #10813 build).
      # - AUTHENTICATION_OIDC_SKIP_TLS_VERIFY=true
      # Auth
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=false
      - AUTHORIZATION_RBAC_ENABLED=true
      - AUTHORIZATION_RBAC_ROOT_USERS=admin-user
      - AUTHENTICATION_APIKEY_ENABLED=true
      - AUTHENTICATION_APIKEY_ALLOWED_KEYS=root-user-key
      - AUTHENTICATION_APIKEY_USERS=admin-user
      # Other
      - QUERY_DEFAULTS_LIMIT=25
      - DEFAULT_VECTORIZER_MODULE=none
      - CLUSTER_HOSTNAME=node1
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
    volumes:
      - weaviate_data_tls:/var/lib/weaviate
    # depends_on:
    #   keycloak:
    #     condition: service_healthy

volumes:
  weaviate_data_tls:
